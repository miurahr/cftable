# キャッシュフロー・シミュレーション 入力設定テンプレート
#
# 【重要】
# 1. このファイルはテンプレートです。直接編集せず、コピーして使用してください。
#    例: cp example_input.template.yaml my_plan.local.yaml
# 2. 実データ（生年月日、年収、資産額など）を記入したファイルは、
#    GitHub などの公開リポジトリにコミットしないよう注意してください。
# 3. 個人用ファイルには `*.local.yaml` または `*.private.yaml` という名前を
#    付けることを推奨します（これらは .gitignore によりコミット対象外になります）。

# 全体設定
simulation_settings:
  inflation_rate: 0.03      # インフレ率 (3% = 0.03)
  # シミュレーション期間の指定 (duration_years か end_age のいずれか一方を指定)
  # duration_years: 50        # シミュレーション期間 (年)
  end_age: 90               # 主メンバー(role: self)がこの年齢になるまで計算
  start_year: 2026          # シミュレーション開始年

# 家族構成 (夫婦2名、子供1名)
members:
  - name: "本人"
    role: "self"
    birth_date: "1980-01-01"
    retirement_age: 65      # 退職年齢
    pension_start_age: 65   # 年金受給開始年齢
  - name: "配偶者"
    role: "spouse"
    birth_date: "1982-05-15"
    retirement_age: 65
    pension_start_age: 65
  - name: "第一子"
    role: "child"
    birth_date: "2020-04-10"
    retirement_age: 65
    pension_start_age: 65

# 収入項目 (複数の収入源に対応)
income_entries:
  - member: "本人"
    category: "salary"      # salary (給与), business (事業), pension (年金) 等
    amount: 6000000         # 年収 所得税と住民税と社会保険料等控除後の手取り (円)
    start_year: 2026
    end_year: 2045          # 2045年までこの収入が続くと仮定
    growth_rate: 0.01       # 昇給率 (1% = 0.01)

  - member: "本人"
    category: "miscellaneous" # 副業・雑収入
    amount: 100000            # 年10万円
    start_year: 2026
    end_year: 2040

  - member: "配偶者"
    category: "part_time"
    amount: 900000
    start_year: 2026
    end_year: 2047

  - member: "本人"
    category: "pension"        # 公的年金 (65歳から)
    amount: 1200000
    start_year: 2045          # 1980年生まれ、2045年に65歳
    end_year: 2074
    growth_rate: 0.01         # マクロ経済スライドではインフレ率より伸びは小さい。

  - member: "本人"
    category: "pension_corporate" # 企業年金 (確定給付企業年金など, DCは投資に入れる)
    amount: 600000
    start_year: 2045
    end_year: 2054
    growth_rate: 0.0

  - member: "配偶者"
    category: "pension"        # 公的年金 (65歳から)
    amount: 1200000
    start_year: 2047          # 1982年生まれ、2047年に65歳
    end_year: 2074
    growth_rate: 0.0

  - member: "本人"
    category: "retirement"      # 退職金 (ワンショット)
    amount: 10000000
    year: 2045

# 支出項目
expense_entries:
  - category: "mortgage"    # 住宅ローン
    amount: 2000000         # 年間返済額
    start_year: 2026
    end_year: 2050
    inflation_indexed: false # フラット35ローンはインフレの影響を受けない

  - category: "food"        # 食費
    amount: 900000
    start_year: 2026
    end_year: 2074          # シミュレーション終了まで
    inflation_indexed: true  # 食費はインフレの影響を受ける

  - category: "utility"     # 光熱費
    amount: 400000
    start_year: 2026
    end_year: 2074
    inflation_indexed: true

  - category: "education"   # 教育費 (子供の進学に合わせて設定)
    member: "第一子"         # 該当する家族の名前を指定
    amount: 1000000         # 小学校入学(6歳)から中学卒業(15歳)まで年100万
    start_age: 6
    end_age: 15
    inflation_indexed: true

  - category: "education"   # 教育費 (高校・大学)
    member: "第一子"
    amount: 2000000         # 高校入学(15歳)から大学卒業(22歳)まで年200万
    start_age: 15
    end_age: 22
    inflation_indexed: true

  - category: "medical"     # 医療費 (年齢とともに増加する例)
    amount: 100000          # 60歳までは年10万
    start_age: 0
    end_age: 60
    inflation_indexed: true

  - category: "medical"
    amount: 200000          # 61歳から75歳は年20万
    start_age: 61
    end_age: 75
    inflation_indexed: true

  - category: "medical"
    amount: 500000          # 76歳以降は年50万
    start_age: 76
    end_age: 120
    inflation_indexed: true

  - category: "tax_and_insurance" # 固定資産税、火災保険など
    amount: 100000                # およそ見積額
    start_age: 46
    end_age: 64                   # 年金受給開始に合わせて設定
    inflation_indexed: true

  - category: "tax_and_insurance" # 社会保険料・住民税・固定資産税 (年金生活期)
    amount: 300000                # およそ見積額
    start_age: 65                 # 年金受給開始に合わせて設定
    end_age: 120
    inflation_indexed: true

  - category: "housing_maintenance" # 住宅設備（給湯器・エアコン等）の買い替え
    amount: 500000                # 買い替え費用（目安）
    start_year: 2035              # 次回の買い替え予定年
    end_year: 2074                # シミュレーション終了まで
    repeat_interval: 15           # 15年おきに発生
    inflation_indexed: true       # 設備価格もインフレの影響を受けると仮定

# 口座・資産状況 (NISA, DC, 特定口座等)
accounts:
  - name: "living"          # 生活費口座
    initial_balance: 1000000 # 初期残高 (円)
    expected_return: 0.0     # 期待利回り (0%)

  - name: "nisa"            # NISA口座
    initial_balance: 500000
    initial_cost_basis: 500000 # 投資元本 (上限管理に使用)
    expected_return: 0.03    # 期待利回り (3%)
    annual_investment_limit: 3600000  # 年間投資枠 (つみたて120万 + 成長240万)
    lifetime_investment_limit: 18000000 # 生涯投資枠
    withdrawal_strategy:     # 取り崩し戦略
      type: "fixed_rate"     # 定率取り崩し
      rate: 0.06             # 毎年 6% ずつ取り崩し
      start_age: 65          # 65歳から開始

  - name: "dc"              # DC/iDeCo (確定拠出年金) 口座
    initial_balance: 500000
    expected_return: 0.03    # 期待利回り (3%)
    contribution_amount: 276000 # 年間拠出額 (例: 月2.3万)
    contribution_end_age: 60    # 拠出終了年齢 (通常60歳まで)
    withdrawal_strategy:     # 取り崩し戦略 (例: 65歳から月5万 = 年60万)
      type: "fixed_amount"
      amount: 600000
      start_age: 65

  - name: "tokutei"          # 特定口座 (投資用、NISAで国債購入できない)
    initial_balance: 0       # 生活費の余剰から投資する
    initial_cost_basis: 0    # 投資元本 (課税計算に使用)
    expected_return: 0.02    # 期待利回り (2%) 個人向け国債の利率
    withdrawal_strategy:     # 取り崩し戦略
      type: "fixed_rate"     # 定率取り崩し
      rate: 0.04             # 毎年 4% ずつ取り崩し
      start_age: 65          # 65歳から開始
