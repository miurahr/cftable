# キャッシュフロー・シミュレーション 入力設定ファイル例
# このファイルを編集して、シミュレーションを実行します。

# 全体設定
simulation_settings:
  inflation_rate: 0.01      # インフレ率 (1% = 0.01)
  duration_years: 50        # シミュレーション期間 (年)
  start_year: 2026          # シミュレーション開始年

# 家族構成 (夫婦2名)
members:
  - name: "本人"
    role: "self"
    birth_date: "1980-01-01"
    retirement_age: 65      # 退職年齢
    pension_start_age: 65   # 年金受給開始年齢
  - name: "配偶者"
    role: "spouse"
    birth_date: "1982-05-15"
    retirement_age: 65
    pension_start_age: 65

# 収入項目 (複数の収入源に対応)
income_entries:
  - member: "本人"
    category: "salary"      # salary (給与), business (事業), pension (年金) 等
    amount: 6000000         # 年収 (円)
    start_year: 2026
    end_year: 2045          # 2045年までこの収入が続くと仮定
    growth_rate: 0.01       # 昇給率 (1% = 0.01)

  - member: "本人"
    category: "miscellaneous" # 副業・雑収入
    amount: 500000
    start_year: 2026
    end_year: 2030

  - member: "配偶者"
    category: "part_time"
    amount: 1200000
    start_year: 2026
    end_year: 2047

  - member: "本人"
    category: "pension"        # 公的年金 (65歳から)
    amount: 2200000
    start_year: 2045          # 1980年生まれ、2045年に65歳
    end_year: 2074
    growth_rate: 0.0          # 年金はインフレ連動する場合もあるが、ここでは0とする

  - member: "本人"
    category: "pension_corporate" # 企業年金1 (確定給付企業年金など、10年確定)
    amount: 600000
    start_year: 2045
    end_year: 2054
    growth_rate: 0.0

  - member: "本人"
    category: "pension_corporate" # 企業年金2 (キャッシュバランスプラン、終身)
    amount: 300000
    start_year: 2045
    end_year: 2074
    growth_rate: 0.0

  - member: "配偶者"
    category: "pension"        # 公的年金 (65歳から)
    amount: 1200000
    start_year: 2047          # 1982年生まれ、2047年に65歳
    end_year: 2074
    growth_rate: 0.0

  - member: "配偶者"
    category: "pension_corporate" # 企業年金 (一時金または年金)
    amount: 400000
    start_year: 2047
    end_year: 2056
    growth_rate: 0.0

# 支出項目
expense_entries:
  - category: "mortgage"    # 住宅ローン
    amount: 1200000         # 年間返済額
    start_year: 2026
    end_year: 2050
    inflation_indexed: false # ローンはインフレの影響を受けない

  - category: "food"        # 食費
    amount: 800000
    start_year: 2026
    end_year: 2074          # シミュレーション終了まで
    inflation_indexed: true  # 食費はインフレの影響を受ける

  - category: "utility"     # 光熱費
    amount: 300000
    start_year: 2026
    end_year: 2074
    inflation_indexed: true

# 口座・資産状況 (NISA, DC, 総合口座等)
accounts:
  - name: "living"          # 生活費口座
    initial_balance: 1000000 # 初期残高 (円)
    expected_return: 0.0     # 期待利回り (0%)

  - name: "defense"         # 生活防衛資金口座 (自動でリザーブされます)
    initial_balance: 1000000
    expected_return: 0.0

  - name: "nisa"            # NISA口座
    initial_balance: 3000000
    expected_return: 0.05    # 期待利回り (5%)

  - name: "dc"              # DC (確定拠出年金) 口座
    initial_balance: 1500000
    expected_return: 0.03    # 期待利回り (3%)

  - name: "general"         # 総合口座 (投資用)
    initial_balance: 5000000
    expected_return: 0.03    # 期待利回り (3%)
    cash_ratio: 0.2          # 現金ポジション 20%
    withdrawal_strategy:     # 取り崩し戦略
      type: "fixed_rate"     # 定率取り崩し
      rate: 0.04             # 毎年 4% ずつ取り崩し
      start_age: 65          # 65歳から開始
